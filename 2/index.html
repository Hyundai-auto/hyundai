<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout de Pagamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09f;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="loading" class="loading-overlay">
        <div class="spinner mb-4"></div>
        <p class="text-lg font-semibold text-gray-700">Gerando seu PIX... Por favor, não feche esta janela.</p>
    </div>

    <div class="max-w-lg mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Finalizar Compra</h2>
        
        <form id="checkout-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nome Completo</label>
                <input type="text" id="name" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">E-mail</label>
                <input type="email" id="email" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">CPF</label>
                <input type="text" id="document" placeholder="000.000.000-00" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Celular/WhatsApp</label>
                <input type="tel" id="phone" placeholder="(00) 00000-0000" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-md hover:bg-blue-700 transition duration-200 uppercase tracking-wide">
                Gerar PIX Agora
            </button>
        </form>
    </div>

    <script>
        document.getElementById('checkout-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const loading = document.getElementById('loading');
            loading.style.display = 'flex';

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const documentNum = document.getElementById('document').value.replace(/\D/g, '');
            const phone = document.getElementById('phone').value.replace(/\D/g, '');

            try {
                // Para gerar o PIX em background e redirecionar direto para a página final:
                // 1. Iniciamos o checkout via Shopify endpoint
                const shopifyUrl = `https://seguro.meuservicomei.com.br/api/public/shopify?product=3198741739882&store=31987&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&document=${documentNum}&phone=${phone}`;
                
                // Abrimos o link em background (iframe oculto) para criar a sessão/token
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = shopifyUrl;
                document.body.appendChild(iframe);

                // Aguardamos um pouco para o sistema deles processar a criação do checkout
                setTimeout(async () => {
                    // Após a criação, o sistema deles geralmente associa os dados ao token.
                    // A forma mais garantida de pular as etapas e ir direto para o PIX 
                    // sem expor erros de CORS é enviar o usuário para a URL do checkout 
                    // com um parâmetro que dispare a finalização automática, 
                    // ou simplesmente redirecionar para a URL final que agora terá os dados salvos.
                    
                    // Como o sistema deles é complexo e protegido, a melhor experiência é o redirecionamento via POST
                    // que preenche tudo e já cai na tela de pagamento.
                    
                    const form = document.createElement('form');
                    form.method = 'POST';
                    form.action = 'https://seguro.meuservicomei.com.br/api/public/shopify?product=3198741739882&store=31987';

                    const fields = { name, email, document: documentNum, phone, payment_method: 'pix' };
                    for (const key in fields) {
                        const input = document.createElement('input');
                        input.type = 'hidden';
                        input.name = key;
                        input.value = fields[key];
                        form.appendChild(input);
                    }

                    document.body.appendChild(form);
                    form.submit();
                }, 1000);

            } catch (error) {
                console.error('Erro:', error);
                window.location.href = `https://seguro.meuservicomei.com.br/api/public/shopify?product=3198741739882&store=31987&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&document=${documentNum}&phone=${phone}`;
            }
        });

        // Máscaras de entrada (CPF e Telefone)
        document.getElementById('document').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.slice(0, 11);
            if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
            else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{0,3})/, "$1.$2.$3");
            else if (v.length > 3) v = v.replace(/(\d{3})(\d{0,3})/, "$1.$2");
            e.target.value = v;
        });

        document.getElementById('phone').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.slice(0, 11);
            if (v.length > 10) v = v.replace(/(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
            else if (v.length > 6) v = v.replace(/(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3");
            else if (v.length > 2) v = v.replace(/(\d{2})(\d{0,5})/, "($1) $2");
            e.target.value = v;
        });
    </script>
</body>
</html>
