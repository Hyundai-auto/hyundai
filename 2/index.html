<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout de Pagamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .loading-overlay.active {
            display: flex;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border-left-color: #22c55e;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0%  { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Overlay de carregamento -->
    <div id="loading" class="loading-overlay">
        <div class="spinner mb-5"></div>
        <p class="text-lg font-semibold text-gray-700">Gerando seu PIX...</p>
        <p class="text-sm text-gray-500 mt-1">Por favor, aguarde enquanto processamos seu pedido.</p>
    </div>

    <!-- Tela de Checkout -->
    <div id="checkout-screen" class="max-w-lg mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Finalizar Compra</h2>

        <form id="checkout-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nome Completo</label>
                <input type="text" id="name" required placeholder="Seu nome completo"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">E-mail</label>
                <input type="email" id="email" required placeholder="seu@email.com"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">CPF</label>
                <input type="text" id="document" placeholder="000.000.000-00" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Celular/WhatsApp</label>
                <input type="tel" id="phone" placeholder="(00) 00000-0000" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>

            <button type="submit"
                class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-md hover:bg-blue-700 transition duration-200 uppercase tracking-wide">
                Gerar PIX Agora
            </button>
        </form>
    </div>

    <script>
        const PRODUCT_ID = '3198741739882';
        const STORE_ID = '31987';
        const BASE_URL = 'https://seguro.meuservicomei.com.br/api/public/shopify';

        // Máscaras
        document.getElementById('document').addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.slice(0, 11);
            e.target.value = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4').replace(/(\d{3})(\d{3})(\d{3})/, '$1.$2.$3').replace(/(\d{3})(\d{3})/, '$1.$2').replace(/(\d{3})/, '$1');
        });

        document.getElementById('phone').addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.slice(0, 11);
            e.target.value = v.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3').replace(/(\d{2})(\d{4})/, '($1) $2').replace(/(\d{2})/, '($1');
        });

        document.getElementById('checkout-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const doc = document.getElementById('document').value.replace(/\D/g, '');
            const phone = document.getElementById('phone').value.replace(/\D/g, '');

            document.getElementById('loading').classList.add('active');

            // Estratégia: Redirecionar para a URL de checkout com os dados
            // e anexar um fragmento (#) que será usado pelo script de automação
            // (Se você tiver controle sobre a página de destino, pode injetar o script lá.
            // Caso contrário, usaremos parâmetros que a plataforma aceita para auto-avançar)
            
            const checkoutUrl = `${BASE_URL}?product=${PRODUCT_ID}&store=${STORE_ID}&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&document=${doc}&phone=${phone}&payment_method=pix&auto_submit=true&instant_buy=true`;

            // Redirecionamento imediato
            window.location.href = checkoutUrl;
        });
    </script>
</body>
</html>
