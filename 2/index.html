<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout de Pagamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09f;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="loading" class="loading-overlay">
        <div class="spinner mb-4"></div>
        <p class="text-lg font-semibold text-gray-700">Gerando seu PIX... Por favor, não feche esta janela.</p>
    </div>

    <div class="max-w-lg mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Finalizar Compra</h2>
        
        <form id="checkout-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nome Completo</label>
                <input type="text" id="name" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">E-mail</label>
                <input type="email" id="email" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">CPF</label>
                <input type="text" id="document" placeholder="000.000.000-00" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Celular/WhatsApp</label>
                <input type="tel" id="phone" placeholder="(00) 00000-0000" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-md hover:bg-blue-700 transition duration-200 uppercase tracking-wide">
                Gerar PIX Agora
            </button>
        </form>
    </div>

    <script>
        document.getElementById('checkout-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const loading = document.getElementById('loading');
            loading.style.display = 'flex';

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const documentNum = document.getElementById('document').value.replace(/\D/g, '');
            const phone = document.getElementById('phone').value.replace(/\D/g, '');

            const payload = {
                name: name,
                email: email,
                document: documentNum,
                phone: phone
            };

            try {
                // A API do Shopify espera JSON. O erro "Unexpected token 'a'" ocorre porque o servidor 
                // tentou ler um formulário comum como se fosse JSON.
                
                const shopifyUrl = 'https://seguro.meuservicomei.com.br/api/public/shopify?product=3198741739882&store=31987';
                
                const response = await fetch(shopifyUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                console.log('Resultado:', result);

                // Se o sistema deles retornar uma URL de redirecionamento ou token
                if (result.url) {
                    window.location.href = result.url;
                } else if (result.token) {
                    window.location.href = `https://seguro.meuservicomei.com.br/checkout/${result.token}`;
                } else {
                    // Fallback: Se não houver URL no JSON, redirecionamos manualmente com os dados
                    // para garantir que o fluxo não quebre
                    window.location.href = `${shopifyUrl}&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&document=${documentNum}&phone=${phone}`;
                }

            } catch (error) {
                console.error('Erro:', error);
                // Em caso de erro de CORS ou rede, tentamos o redirecionamento via URL (GET) como última alternativa
                const shopifyUrlFallback = `https://seguro.meuservicomei.com.br/api/public/shopify?product=3198741739882&store=31987&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&document=${documentNum}&phone=${phone}`;
                window.location.href = shopifyUrlFallback;
            }
        });

        // Máscaras de entrada (CPF e Telefone)
        document.getElementById('document').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.slice(0, 11);
            if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
            else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{0,3})/, "$1.$2.$3");
            else if (v.length > 3) v = v.replace(/(\d{3})(\d{0,3})/, "$1.$2");
            e.target.value = v;
        });

        document.getElementById('phone').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.slice(0, 11);
            if (v.length > 10) v = v.replace(/(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
            else if (v.length > 6) v = v.replace(/(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3");
            else if (v.length > 2) v = v.replace(/(\d{2})(\d{0,5})/, "($1) $2");
            e.target.value = v;
        });
    </script>
</body>
</html>
